[manifest]
version = "1.0.0"
dump_lua = true
priority = -1

# Spawn rock in deck
[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/overrides.lua"]'''
pattern = '''while i <= math.min(4, #visible_suit) do'''
position = "before"
payload = '''
local wormhole_deck_areas = {}
for _, deck_table in ipairs(deck_tables) do
    table.insert(wormhole_deck_areas, deck_table.nodes[1].config.object)
end
WORM_JTEM.quantum_rock.calculate({ wormhole_opening_deck = true, areas = wormhole_deck_areas })
'''
match_indent = true
